<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SaleCast — Steam Smart Buy</title>
<link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <div class="layout">
    <main>
      <header>
        <h1>SaleCast</h1>
        <p class="subtitle">Search a Steam game to see its discounting cluster, smart-buy odds, and deal score.</p>
      </header>

      <section class="search">
        <input id="search-input" type="text" placeholder="Search a game (e.g. Counter-Strike)" autocomplete="off" />
        <ul id="results" class="results"></ul>
      </section>

      <section id="game-panel" class="game-panel hidden"></section>

      <footer>
        <details>
          <summary>API settings</summary>
          <label for="api-base">API base URL</label>
          <input id="api-base" type="text" />
          <button id="api-base-save">Save</button>
          <p class="hint">Defaults to a local API at <code>http://localhost:8000</code> (run <code>uvicorn salecast.api:app --reload</code>). Point this at your deployed Render URL once it's live.</p>
        </details>
      </footer>
    </main>

    <!-- Pre-computed once a day (scripts/generate_sidebar_deals.py) and
         deployed as a static file, so this sidebar never depends on the
         (free-tier, sleep-prone) API - it's as fast as the rest of the page. -->
    <aside class="deals-sidebar">
      <section class="deals-section">
        <h2>Top Deals</h2>
        <ul id="top-deals-list" class="deals-list"></ul>
      </section>
      <section class="deals-section">
        <h2>New Deals</h2>
        <ul id="new-deals-list" class="deals-list"></ul>
      </section>
    </aside>
  </div>

  <!-- ?v= is a manual cache-buster: bump it whenever charts.js/app.js/
       style.css change. index.html itself always revalidates (max-age=0), but
       Cloudflare Pages serves static assets with a 4-hour cache and no
       revalidation within that window, so an unchanged URL would keep
       serving the old script to anyone who loaded the page recently. -->
  <script src="charts.js?v=8"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
