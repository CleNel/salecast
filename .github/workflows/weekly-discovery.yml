name: Weekly game discovery

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap the SteamSpy candidate pool (smoke test)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Discover newly qualifying games
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python scripts/run_discovery.py --target d1 ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }}

      - name: Backfill historical lows for any newly discovered games
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
        run: |
          python scripts/run_backfill.py --target d1

      - name: Check for tracked games with stale price data
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python scripts/check_price_staleness.py --target d1 --max-age-days 14
