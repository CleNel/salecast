services:
  - type: web
    name: salecast-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn salecast.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SALECAST_TARGET
        value: d1
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_D1_DATABASE_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
